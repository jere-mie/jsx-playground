name: Release jsxcc

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "version.txt"
      - ".github/workflows/release-jsxcc.yml"

permissions:
  contents: write

concurrency:
  group: release-jsxcc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < version.txt)"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          rm -rf release-assets
          mkdir -p release-assets

          while IFS='|' read -r target asset_name binary_name; do
            [ -n "$target" ] || continue
            (
              cd jsxcc
              zig build -Doptimize=ReleaseSafe -Dtarget="$target"
            )

            cp "jsxcc/zig-out/bin/${binary_name}" "release-assets/${asset_name}"
          done <<'TARGETS'
          x86_64-linux-musl|jsxcc-linux-x86_64|jsxcc
          aarch64-linux-musl|jsxcc-linux-aarch64|jsxcc
          x86_64-windows|jsxcc-windows-x86_64.exe|jsxcc.exe
          x86_64-macos|jsxcc-macos-x86_64|jsxcc
          aarch64-macos|jsxcc-macos-aarch64|jsxcc
          TARGETS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.value }}"
          shopt -s nullglob
          files=(release-assets/*)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "jsxcc $tag" \
              --notes "Automated jsxcc release from version.txt." \
              --target "$GITHUB_SHA"
          fi
