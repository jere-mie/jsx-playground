name: Release jsxcc

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "version.txt"
      - ".github/actions/setup-zig-direct/**"
      - ".github/workflows/release-jsxcc.yml"

permissions:
  contents: write

concurrency:
  group: release-jsxcc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: ./.github/actions/setup-zig-direct
        with:
          version: 0.15.2

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < version.txt)"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          rm -rf release-stage release-assets
          mkdir -p release-stage release-assets

          while IFS='|' read -r target platform_name binary_name archive_format; do
            [ -n "$target" ] || continue
            zig build -Doptimize=ReleaseSafe -Dtarget="$target"

            base="jsxcc-v${version}-${platform_name}"
            stage_dir="release-stage/$base"
            rm -rf "$stage_dir"
            mkdir -p "$stage_dir"

            cp "jsxcc/zig-out/bin/${binary_name}" "$stage_dir/"
            cp LICENSE "$stage_dir/"
            cp "jsxcc/README.md" "$stage_dir/README.md"
            cp version.txt "$stage_dir/"

            if [ "$archive_format" = "tar.gz" ]; then
              tar -C release-stage -czf "release-assets/${base}.tar.gz" "$base"
            else
              (
                cd release-stage
                zip -qr "../release-assets/${base}.zip" "$base"
              )
            fi
          done <<'TARGETS'
          x86_64-linux-musl|linux-x86_64|jsxcc|tar.gz
          aarch64-linux-musl|linux-aarch64|jsxcc|tar.gz
          x86_64-windows|windows-x86_64|jsxcc.exe|zip
          x86_64-macos|macos-x86_64|jsxcc|tar.gz
          aarch64-macos|macos-aarch64|jsxcc|tar.gz
          TARGETS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.value }}"
          shopt -s nullglob
          files=(release-assets/*)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --title "jsxcc $tag" \
              --notes "Automated jsxcc release from version.txt." \
              --target "$GITHUB_SHA"
          fi
