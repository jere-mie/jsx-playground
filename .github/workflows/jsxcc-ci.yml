name: jsxcc CI

on:
  pull_request:
    paths:
      - "jsxcc/**"
      - "version.txt"
      - ".github/workflows/jsxcc-ci.yml"
  push:
    branches:
      - main
    paths:
      - "jsxcc/**"
      - "version.txt"
      - ".github/workflows/jsxcc-ci.yml"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run Zig tests
        working-directory: jsxcc
        run: zig build test

      - name: Build release binary
        working-directory: jsxcc
        run: zig build -Doptimize=ReleaseSafe
